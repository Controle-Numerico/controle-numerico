<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle Numérico 2026</title>

<style>
* { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }

body {
  margin: 0;
  background: #eef3f8;
  color: #1f2937;
}

.container {
  max-width: 1350px;
  margin: 20px auto;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.08);
  padding: 22px;
}

/* ===== NOVO CABEÇALHO ===== */
.org {
  text-align: center;
  color: #dc2626;
  font-size: 22px;
  margin: 0;
  font-weight: bold;
}

.titulo {
  text-align: center;
  color: #0f4c81;
  font-size: 36px;
  margin: 5px 0 10px;
}

.subtitle {
  text-align: center;
  color: #607284;
  margin-bottom: 20px;
  font-size: 15px;
}

.top {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  margin-bottom: 14px;
}

input, select, button, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #c9d4df;
  font-size: 16px;
}

button {
  font-weight: bold;
  border: none;
  cursor: pointer;
}

.btn-green { background: #1ea446; color: white; }
.btn-gray { background: #eceff3; }

.info {
  background: #eef3f8;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 18px;
}

.number-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
  gap: 8px;
}

.num {
  background: #fff;
  border: 1px solid #cfd7df;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
}

.num.used {
  background: #0f4c81;
  color: #fff;
}

.num.next {
  outline: 3px solid #1ea446;
  background: #ecfdf3;
}

.used-list {
  margin-top: 18px;
}

.tag {
  background: #e8f1f8;
  border-radius: 999px;
  padding: 6px 10px;
  margin: 3px;
  display: inline-block;
}

.alert {
  margin-top: 14px;
  padding: 10px;
  background: #f8fbff;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="org">🚒 CB São Lourenço do Sul</h1>
<h2 class="titulo">📋 Controle Numérico</h2>

<div class="subtitle">
Controle de Numeração Sequencial 2026 • Mensagens Enviadas • Observação bloqueada após salvar
</div>

<div class="top">
<select id="tipo"></select>
<button class="btn-green" onclick="marcarProximo()">Marcar Próximo</button>
<button class="btn-gray" onclick="salvar()">Salvar</button>
</div>

<div class="top">
<input type="number" id="buscarNumero" placeholder="Buscar número">
<button class="btn-gray" onclick="localizarNumero()">Localizar</button>
</div>

<div class="info" id="info"></div>
<div class="number-grid" id="grid"></div>

<div class="used-list">
<h3>Números usados</h3>
<div id="usedTags"></div>
</div>

<div class="alert" id="status">Sistema pronto.</div>

</div>

<script>
const BIN_ID="69cbc58536566621a8669c2e";
const API_KEY="$2a$10$zZG0IbSsjFx8uhKbysI2MurESZSHmb/kQxS6GJqggDJDjA2FFUeTu";
const URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;

const TIPOS={
guiaCautelas:{nome:"Guia de Cautelas",min:6,max:100,d:2},
guiasMalote:{nome:"Guias de Malote",min:1,max:200,d:2},
mensagensExpressas:{nome:"Mensagens Expressas",min:202,max:1000,d:3},
notaBI:{nome:"Nota para BI",min:14,max:500,d:3},
numeroProcessoFunrebom:{nome:"Número Processo Funrebom",min:1,max:100,d:2},
oficiosExpedidos:{nome:"Ofícios Expedidos",min:4,max:500,d:3},
ordensServico:{nome:"Ordens de Serviço",min:2,max:500,d:3},
partes:{nome:"Partes",min:8,max:500,d:3},
relatorioVulto:{nome:"Relatório de Vulto",min:1,max:200,d:3},
sodc4pelbm:{nome:"SODC 4PelBM",min:3,max:500,d:3}
};

let db={ano2026:{}};

const tipoEl=document.getElementById("tipo");
const grid=document.getElementById("grid");
const info=document.getElementById("info");
const usedTags=document.getElementById("usedTags");
const status=document.getElementById("status");

function pad(n,d){return String(n).padStart(d,"0")}

function init(){
Object.entries(TIPOS).sort((a,b)=>a[1].nome.localeCompare(b[1].nome))
.forEach(([k,v])=>{
let o=document.createElement("option");
o.value=k;o.textContent=v.nome;
tipoEl.appendChild(o);
});
render();
}

function getLista(t){
if(!db.ano2026[t])db.ano2026[t]={usados:{}};
return db.ano2026[t].usados;
}

function getProx(t){
let cfg=TIPOS[t];
let lista=getLista(t);
for(let i=cfg.min;i<=cfg.max;i++){
if(!lista[i])return i;
}
return null;
}

function render(){
let t=tipoEl.value;
let cfg=TIPOS[t];
let lista=getLista(t);
let prox=getProx(t);

grid.innerHTML="";
for(let i=cfg.min;i<=cfg.max;i++){
let d=document.createElement("div");
d.className="num";
d.textContent=pad(i,cfg.d);

if(lista[i])d.classList.add("used");
if(i===prox)d.classList.add("next");

d.onclick=()=>clickNum(t,i);
grid.appendChild(d);
}

info.innerHTML=`<b>${cfg.nome}</b><br>Próximo: ${prox?pad(prox,cfg.d):"Fim"}`;

usedTags.innerHTML="";
Object.keys(lista).forEach(n=>{
let tag=document.createElement("span");
tag.className="tag";
tag.textContent=cfg.nome+" "+pad(n,cfg.d);
usedTags.appendChild(tag);
});
}

function clickNum(t,n){
let prox=getProx(t);
if(n!==prox){status.textContent="Sequência obrigatória";return;}
let obs=prompt("Observação:");
if(obs===null)return;
getLista(t)[n]={obs,dt:new Date().toISOString()};
render();
salvar();
}

function marcarProximo(){
let t=tipoEl.value;
let n=getProx(t);
if(!n)return alert("Fim da numeração");
clickNum(t,n);
}

function localizarNumero(){
let n=parseInt(document.getElementById("buscarNumero").value);
alert("Busca simples: "+n);
}

async function salvar(){
await fetch(URL,{
method:"PUT",
headers:{"Content-Type":"application/json","X-Access-Key":API_KEY},
body:JSON.stringify(db)
});
status.textContent="Salvo!";
}

tipoEl.onchange=render;

init();
</script>

</body>
</html>
