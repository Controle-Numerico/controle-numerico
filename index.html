<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Numérico 2026</title>

<style>
* { box-sizing: border-box; font-family: Arial; }

body { margin:0; background:#eef3f8; }

.container {
  max-width:1200px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:16px;
}

.titulo { text-align:center; font-size:28px; color:#0f4c81; }
.subtitle { text-align:center; margin-bottom:15px; }

.top { display:flex; gap:10px; margin-bottom:10px; }

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-green { background:#1ea446; color:#fff; }
.btn-gray { background:#ddd; }

.number-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:6px;
}

.num {
  padding:12px;
  text-align:center;
  border-radius:8px;
  border:1px solid #ccc;
  cursor:pointer;
}

.num.used { background:#0f4c81; color:#fff; }
.num.next { background:#c8f7d2; }

.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:500px;
}

.confirmacao {
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:14px;
}

.ok { background:#e6f9ec; color:#166534; }
.erro { background:#fdecec; color:#991b1b; }

</style>
</head>

<body>

<div class="container">
  <div class="titulo">📋 Controle Numérico</div>
  <div class="subtitle">Visual livre • Registro com ID Funcional</div>

  <div class="top">
    <button class="btn-green" onclick="abrirRegistro()">Marcar Próximo</button>
    <button class="btn-gray" onclick="salvar()">Salvar</button>
  </div>

  <div class="number-grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">

    <h3>Registrar número</h3>

    <input id="idFunc" placeholder="Digite o ID Funcional" />
    <div id="confirmacao" class="confirmacao"></div>

    <textarea id="obs" placeholder="Observação"></textarea>

    <br><br>
    <button class="btn-green" onclick="confirmarRegistro()">Salvar</button>
    <button class="btn-gray" onclick="fechar()">Cancelar</button>

  </div>
</div>

<script>

const FUNCIONARIOS = {
"2614960":"ALESSANDRO BASTOS VICENTE",
"2882930":"ANDERSON SILVA DA SILVA",
"4626338":"CAIQUE MOTTA",
"2972719":"EDI DIEFERSON RIBEIRO DE VARGAS",
"3698696":"GABRIEL VELEDA CAMACHO",
"2692449":"JULIANO INSAURRIAGA BATISTA",
"4490380":"LARSSON FROMMING FREDES",
"3218627":"MAGNO NORNBERG TOMASCHEWSKI",
"2423286":"MARCELO BANDEIRA TAVARES",
"3697665":"MARLON ISQUIERDO AZEVEDO",
"3084620":"MAX STEVENS OLIVEIRA NUNES",
"3698530":"RAFAEL LISCANO",
"3698440":"SAYMON CARLOS ARAUJO BORGES",
"4625595":"THIAGO CHAGAS SOARES",
"4783069":"VANDERLEI JESKE PEGLOW",
"3702847":"VINICIUS INSAURRIAGA BATISTA",
"2910233":"VINICIUS MACHADO DE MORAES",
"4355504":"WILLIAM RIBEIRO MEDEIROS"
};

let dados = [];
let numeroAtual = 1;

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=1;i<=100;i++){
    let div = document.createElement("div");
    div.className="num";

    let usado = dados.find(x=>x.numero===i);

    if(usado){
      div.classList.add("used");
      div.innerText=i;
      div.title = usado.nome + " ("+usado.id+")";
    }else if(i===numeroAtual){
      div.classList.add("next");
      div.innerText=i;
    }else{
      div.innerText=i;
    }

    grid.appendChild(div);
  }
}

function abrirRegistro(){
  document.getElementById("modal").style.display="flex";
}

function fechar(){
  document.getElementById("modal").style.display="none";
}

document.getElementById("idFunc").addEventListener("input", function(){
  let id = this.value.replace(/\D/g,"");
  this.value = id;

  let box = document.getElementById("confirmacao");

  if(FUNCIONARIOS[id]){
    box.className="confirmacao ok";
    box.innerText = "✔ " + FUNCIONARIOS[id];
  }else{
    box.className="confirmacao erro";
    box.innerText = "ID não encontrado";
  }
});

function confirmarRegistro(){
  let id = document.getElementById("idFunc").value;
  let nome = FUNCIONARIOS[id];
  let obs = document.getElementById("obs").value;

  if(!nome){
    alert("ID inválido");
    return;
  }

  dados.push({
    numero: numeroAtual,
    id: id,
    nome: nome,
    obs: obs
  });

  numeroAtual++;

  fechar();
  render();
}

function salvar(){
  alert("Simulação de salvar OK");
}

render();

</script>

</body>
</html>
